<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tables and Media</title>
</head>
<body>

    <!-- Semantic Table -->
    <table border="1">

        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Rahul</td>
            </tr>

            <tr>
                <td>102</td>
                <td>Priya</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Aman</td>
            </tr>
        </tbody>

    </table>

    <!-- Heading -->
    <h2>List of medias</h2>

    <!-- Ordered List -->
    <ol>

        <!-- Image -->
        <li>
            <img 
                src="https://picsum.photos/id/123/200/300" 
                alt="Random Image">
        </li>

        <!-- Video -->
        <li>
            <video width="320" height="240" controls>
                <source 
                    src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                    type="video/mp4">
            </video>
        </li>

        <!-- Audio -->
        <li>
            <audio controls>
                <source 
                    src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" 
                    type="audio/ogg">
            </audio>
        </li>

    </ol>

</body>
</html>
